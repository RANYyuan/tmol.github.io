<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RANY'S · 创作链接</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: 'Inter', 'Helvetica Neue', 'SF Pro Text', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            font-weight: 400;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* 极简星辰背景 (保留氛围) */
        #stardust {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 2;
            max-width: 680px;
            width: 90%;
            text-align: center;
            padding: 2rem 1rem;
        }

        /* 主标题 */
        .main-title {
            font-size: clamp(3rem, 12vw, 6rem);
            font-weight: 800;
            letter-spacing: 0.05em;
            color: #ff3333;
            text-shadow: 0 0 10px rgba(255,51,51,0.4);
            margin-bottom: 0.5rem;
        }

        /* 副标题或签名 */
        .sub {
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            color: #aaaaaa;
            margin-bottom: 3rem;
            border-bottom: 1px solid rgba(255,51,51,0.3);
            display: inline-block;
            padding-bottom: 0.5rem;
        }

        /* 按钮网格 */
        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            width: 100%;
            margin: 2rem 0;
        }

        /* 每个按钮的样式 — 极简红边 */
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: transparent;
            border: 1px solid #ff3333;
            color: #ff3333;
            padding: 0.9rem 1rem;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            transition: all 0.25s ease;
            cursor: pointer;
            backdrop-filter: blur(4px);
            border-radius: 0px;  /* 直角，保持硬朗 */
        }

        .link-btn:hover {
            background: #ff3333;
            color: #000000;
            box-shadow: 0 0 12px rgba(255,51,51,0.5);
            transform: scale(1.01);
        }

        /* 图标样式 (简单emoji或文字图标，你也可以换成图片) */
        .btn-icon {
            font-size: 1.4rem;
            filter: drop-shadow(0 0 2px currentColor);
        }

        /* 底部 */
        .footer-note {
            font-size: 0.65rem;
            color: #555;
            margin-top: 3rem;
            border-top: 0.5px solid #222;
            display: inline-block;
            padding-top: 1rem;
            letter-spacing: 0.05em;
        }

        @media (max-width: 500px) {
            .link-btn { font-size: 0.9rem; padding: 0.7rem; }
            .btn-icon { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<canvas id="stardust"></canvas>

<div class="container">
    <div class="main-title">RANY'S</div>
    <div class="sub">/ 创 作 聚 合 点</div>

    <div class="links-grid">
        <!-- 小红书按钮 -->
        <a href="https://www.xiaohongshu.com/user/profile/5e2944230000000001004d1b?xsec_token=ABZ4lCUwmh9kwkZkRPC4thIXMLGIjpm1-PTes-KxICFjE=&xsec_source=pc_search" target="_blank" rel="noopener noreferrer" class="link-btn">
            <span class="btn-icon">📕</span> 小红书 · 日常创作
        </a>

        <!-- B站按钮 -->
        <a href="https://space.bilibili.com/3691012985719349?spm_id_from=333.337.0.0" target="_blank" rel="noopener noreferrer" class="link-btn">
            <span class="btn-icon">🎬</span> Bilibili · 视频记录
        </a>

        <!-- 公众号文章（作品集入口） -->
        <a href="https://mp.weixin.qq.com/s/d-Ll5hf9ey4P7LjsfaKZTw" target="_blank" rel="noopener noreferrer" class="link-btn">
            <span class="btn-icon">📖</span> 公众号 · 《A little book of Rany》
        </a>

        <!-- 淘宝店铺 -->
        <a href="https://shop61204986.taobao.com/shop/view_shop.htm?appUid=RAzN8HWKS5NnEeNmPggqeRvL3oNyn3WNmzhxV6vnfBjNebVyG8h&spm=a21n57.1.hoverItem.1" target="_blank" rel="noopener noreferrer" class="link-btn">
            <span class="btn-icon">🛒</span> 淘宝 · TMOL STUDIO
        </a>
    </div>

    <div class="footer-note">✦ 点击跳转 · 感谢每一次相遇 ✦</div>
</div>

<script>
    // ---------- 极简星辰背景（保留原有效果，极淡）----------
    const canvas = document.getElementById('stardust');
    const ctx = canvas.getContext('2d');
    let width = window.innerWidth;
    let height = window.innerHeight;
    let stars = [];

    function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        initStars();
    }

    function initStars() {
        stars = [];
        for (let i = 0; i < 120; i++) {
            stars.push({
                x: Math.random() * width,
                y: Math.random() * height,
                radius: Math.random() * 1.5 + 0.5,
                alpha: Math.random() * 0.3 + 0.1,
                vx: (Math.random() - 0.5) * 0.02,
                vy: (Math.random() - 0.5) * 0.01
            });
        }
    }

    function drawStars() {
        for (let s of stars) {
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 220, 180, ${s.alpha})`;
            ctx.fill();
            s.x += s.vx;
            s.y += s.vy;
            if (s.x < 0) s.x = width;
            if (s.x > width) s.x = 0;
            if (s.y < 0) s.y = height;
            if (s.y > height) s.y = 0;
        }
    }

    function animateStars() {
        if (!ctx) return;
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, width, height);
        drawStars();
        requestAnimationFrame(animateStars);
    }

    window.addEventListener('resize', () => {
        resizeCanvas();
    });
    resizeCanvas();
    animateStars();
</script>
</body>
</html>
