<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TRUE MEANING OF LIFE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: 'Inter', 'Helvetica Neue', 'SF Pro Text', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            font-weight: 400;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* 极简星辰背景 (canvas) */
        #stardust {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* 主内容容器 — 极简留白 */
        .container {
            position: relative;
            z-index: 2;
            max-width: 880px;
            width: 90%;
            text-align: center;
            padding: 3rem 1rem;
        }

        /* 主标题 — 轻盈，字距，无炫光 */
        .main-title {
            font-size: clamp(2.2rem, 8vw, 4.2rem);
            font-weight: 300;
            letter-spacing: 0.2em;
            color: #f0f0f0;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
            opacity: 0.92;
        }

        /* 地球旅行年数 — 干净，细线点缀 */
        .years-block {
            margin: 2rem 0 3rem;
        }
        .years-label {
            font-size: 0.75rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 0.75rem;
        }
        .years-number {
            font-size: 4rem;
            font-weight: 400;
            font-family: 'Inter', 'SF Mono', monospace;
            color: #ffffff;
            letter-spacing: 0.05em;
            background: none;
            display: inline-block;
            padding: 0 0.2rem;
        }
        .years-unit {
            font-size: 1.2rem;
            font-weight: 300;
            color: #aaa;
            margin-left: 0.3rem;
        }

        /* 横排指标 — 极简分割 */
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin: 2rem 0 2.5rem;
            border-top: 1px solid rgba(255,255,255,0.12);
            padding-top: 2rem;
        }
        .stat-item {
            min-width: 90px;
            text-align: center;
        }
        .stat-number {
            font-size: 2.2rem;
            font-weight: 400;
            font-family: 'Inter', 'SF Mono', monospace;
            color: #e0e0e0;
            letter-spacing: 0.02em;
        }
        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #777;
            margin-top: 0.4rem;
        }

        /* 出生信息 — 极小，不打扰 */
        .birth-meta {
            font-size: 0.65rem;
            color: #555;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: inline-block;
            padding-top: 1rem;
            margin-top: 0.5rem;
            font-weight: 300;
            letter-spacing: 0.1em;
        }

        /* 刷新按钮 — 极淡 */
        .refresh-btn {
            background: transparent;
            border: 0.5px solid #333;
            color: #777;
            font-size: 0.65rem;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            margin-top: 2rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            letter-spacing: 0.1em;
        }
        .refresh-btn:hover {
            color: #ccc;
            border-color: #666;
        }

        /* 脚注 — 可有可无的细语 */
        footer {
            font-size: 0.55rem;
            color: #3a3a3a;
            margin-top: 3rem;
            letter-spacing: 0.1em;
        }

        @media (max-width: 600px) {
            .stats-row { gap: 1rem; }
            .stat-number { font-size: 1.4rem; }
            .years-number { font-size: 2.6rem; }
            .main-title { letter-spacing: 0.1em; }
        }
    </style>
</head>
<body>

<canvas id="stardust"></canvas>

<div class="container">
    <div class="main-title">TRUE MEANING OF LIFE</div>

    <div class="years-block">
        <div class="years-label">EARTH JOURNEY</div>
        <div>
            <span class="years-number" id="yearsCount">0</span>
            <span class="years-unit">年</span>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-item">
            <div class="stat-number" id="totalDays">0</div>
            <div class="stat-label">天</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="totalHours">0</div>
            <div class="stat-label">小时</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="totalMinutes">0</div>
            <div class="stat-label">分钟</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="totalSeconds">0</div>
            <div class="stat-label">秒</div>
        </div>
    </div>

    <div class="birth-meta">1989.10.24 / 23:30:00</div>
    <button class="refresh-btn" id="refreshBtn">SYNC</button>
    <footer>every second holds meaning</footer>
</div>

<script>
    // 出生时间：1989年10月24日 23:30:00 (月份 9 代表十月)
    const birthDate = new Date(1989, 9, 24, 23, 30, 0);

    function getTimeStats(now, birth) {
        const diffMs = now - birth;
        const totalSeconds = Math.floor(diffMs / 1000);
        const totalMinutes = Math.floor(totalSeconds / 60);
        const totalHours = Math.floor(totalMinutes / 60);
        const totalDays = Math.floor(totalHours / 24);
        // 年份计算（精确到生日）
        let years = now.getFullYear() - birth.getFullYear();
        const monthDiff = now.getMonth() - birth.getMonth();
        if (monthDiff < 0 || (monthDiff === 0 && now.getDate() < birth.getDate())) {
            years--;
        }
        return { totalDays, totalHours, totalMinutes, totalSeconds, years };
    }

    function updateDisplay() {
        const now = new Date();
        const stats = getTimeStats(now, birthDate);
        document.getElementById('yearsCount').innerText = stats.years;
        document.getElementById('totalDays').innerText = stats.totalDays.toLocaleString();
        document.getElementById('totalHours').innerText = stats.totalHours.toLocaleString();
        document.getElementById('totalMinutes').innerText = stats.totalMinutes.toLocaleString();
        document.getElementById('totalSeconds').innerText = stats.totalSeconds.toLocaleString();
    }

    updateDisplay();
    setInterval(updateDisplay, 1000);
    document.getElementById('refreshBtn').addEventListener('click', updateDisplay);

    // ---------- 极简星辰背景（极少粒子，缓慢游动）----------
    const canvas = document.getElementById('stardust');
    const ctx = canvas.getContext('2d');
    let width = window.innerWidth;
    let height = window.innerHeight;
    let stars = [];

    function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        initStars();
    }

    function initStars() {
        stars = [];
        // 极简主义：只有 80 颗星，非常微光
        for (let i = 0; i < 80; i++) {
            stars.push({
                x: Math.random() * width,
                y: Math.random() * height,
                radius: Math.random() * 1.2 + 0.6,
                alpha: Math.random() * 0.35 + 0.1,
                vx: (Math.random() - 0.5) * 0.03,
                vy: (Math.random() - 0.5) * 0.02
            });
        }
    }

    function drawStars() {
        for (let s of stars) {
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 245, 210, ${s.alpha})`;
            ctx.fill();
            s.x += s.vx;
            s.y += s.vy;
            if (s.x < 0) s.x = width;
            if (s.x > width) s.x = 0;
            if (s.y < 0) s.y = height;
            if (s.y > height) s.y = 0;
        }
    }

    function animateStars() {
        if (!ctx) return;
        ctx.clearRect(0, 0, width, height);
        // 纯黑背景
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, width, height);
        drawStars();
        requestAnimationFrame(animateStars);
    }

    window.addEventListener('resize', () => {
        resizeCanvas();
    });
    resizeCanvas();
    animateStars();
</script>
</body>
</html>

我喜欢这个版本， 看把TRUE MEANING OF LIFE 改成循环变色的， 依次每个字编程红色， 慢慢的跑马灯的方式。
