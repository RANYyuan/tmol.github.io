<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TRUE MEANING OF LIFE · 线构红与黑</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            font-family: 'Inter', 'Helvetica Neue', 'SF Pro Text', 'PingFang SC', 'Microsoft YaHei', monospace;
            font-weight: 400;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 主容器 — 极窄留白，线框结构 */
        .container {
            width: 90%;
            max-width: 800px;
            text-align: center;
            padding: 2rem 1rem;
            border: 1px solid #ff3333;      /* 红色外框线 */
            box-shadow: 0 0 0 1px rgba(255,51,51,0.2);
            background: #000000;
        }

        /* 顶部横线 */
        .top-line {
            width: 60px;
            height: 1px;
            background: #ff3333;
            margin: 0 auto 1.5rem auto;
        }

        /* 主标题 */
        .main-title {
            font-size: clamp(1.6rem, 6vw, 2.8rem);
            font-weight: 300;
            letter-spacing: 0.15em;
            color: #ffffff;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            word-break: keep-all;
        }

        /* 下方短红线 */
        .underline-red {
            width: 40px;
            height: 1px;
            background: #ff3333;
            margin: 1rem auto 2rem auto;
        }

        /* 地球旅行年数 */
        .years-section {
            margin: 1rem 0 2rem;
        }
        .years-label {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            color: #aaaaaa;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        .years-value {
            font-size: 3.2rem;
            font-weight: 400;
            font-family: 'SF Mono', 'Inter', monospace;
            color: #ff5555;       /* 红色数字 */
            letter-spacing: 0.05em;
            display: inline-block;
            border-bottom: 1px solid #ff3333;
            padding-bottom: 0.2rem;
        }
        .years-unit {
            font-size: 1rem;
            color: #888;
            margin-left: 0.3rem;
        }

        /* 横排指标 — 线性分割 */
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin: 2rem 0 1.5rem;
            border-top: 1px solid #ff3333;
            padding-top: 2rem;
            border-bottom: 1px solid #ff3333;
            padding-bottom: 1.8rem;
        }
        .stat-item {
            min-width: 90px;
            text-align: center;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 400;
            font-family: 'SF Mono', 'Inter', monospace;
            color: #ff8888;      /* 淡红数字 */
            letter-spacing: 0.02em;
        }
        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #777;
            margin-top: 0.3rem;
        }

        /* 出生信息 — 灰线 */
        .birth-meta {
            font-size: 0.65rem;
            color: #666;
            border-top: 1px solid #222;
            display: inline-block;
            padding-top: 1rem;
            margin: 1rem 0;
            letter-spacing: 0.05em;
        }

        /* 刷新按钮 — 红边黑底 */
        .refresh-btn {
            background: transparent;
            border: 0.5px solid #ff5555;
            color: #ff8888;
            font-size: 0.65rem;
            padding: 0.3rem 1rem;
            border-radius: 0px;
            margin-top: 0.5rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            letter-spacing: 0.1em;
        }
        .refresh-btn:hover {
            background: #ff3333;
            color: #000000;
            border-color: #ff3333;
        }

        /* 脚注细线 */
        footer {
            font-size: 0.55rem;
            color: #3a3a3a;
            margin-top: 2rem;
            border-top: 0.5px solid #222;
            padding-top: 1rem;
            letter-spacing: 0.05em;
        }

        @media (max-width: 600px) {
            .stats-row { gap: 1rem; }
            .stat-number { font-size: 1.4rem; }
            .years-value { font-size: 2.2rem; }
            .container { padding: 1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-line"></div>
    <div class="main-title">TRUE MEANING OF LIFE</div>
    <div class="underline-red"></div>

    <div class="years-section">
        <div class="years-label">EARTH JOURNEY</div>
        <div>
            <span class="years-value" id="yearsCount">0</span>
            <span class="years-unit">年</span>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-item">
            <div class="stat-number" id="totalDays">0</div>
            <div class="stat-label">天</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="totalHours">0</div>
            <div class="stat-label">小时</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="totalMinutes">0</div>
            <div class="stat-label">分钟</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="totalSeconds">0</div>
            <div class="stat-label">秒</div>
        </div>
    </div>

    <div class="birth-meta">1989.10.24 / 23:30:00</div>
    <button class="refresh-btn" id="refreshBtn">⟳ SYNC</button>
    <footer>LINES & TIME</footer>
</div>

<script>
    // 出生时间：1989年10月24日 23:30:00
    const birthDate = new Date(1989, 9, 24, 23, 30, 0);

    function getTimeStats(now, birth) {
        const diffMs = now - birth;
        const totalSeconds = Math.floor(diffMs / 1000);
        const totalMinutes = Math.floor(totalSeconds / 60);
        const totalHours = Math.floor(totalMinutes / 60);
        const totalDays = Math.floor(totalHours / 24);
        // 年份精确到生日
        let years = now.getFullYear() - birth.getFullYear();
        const monthDiff = now.getMonth() - birth.getMonth();
        if (monthDiff < 0 || (monthDiff === 0 && now.getDate() < birth.getDate())) {
            years--;
        }
        return { totalDays, totalHours, totalMinutes, totalSeconds, years };
    }

    function updateDisplay() {
        const now = new Date();
        const stats = getTimeStats(now, birthDate);
        document.getElementById('yearsCount').innerText = stats.years;
        document.getElementById('totalDays').innerText = stats.totalDays.toLocaleString();
        document.getElementById('totalHours').innerText = stats.totalHours.toLocaleString();
        document.getElementById('totalMinutes').innerText = stats.totalMinutes.toLocaleString();
        document.getElementById('totalSeconds').innerText = stats.totalSeconds.toLocaleString();
    }

    updateDisplay();
    setInterval(updateDisplay, 1000);
    document.getElementById('refreshBtn').addEventListener('click', updateDisplay);
</script>

</body>
</html>
