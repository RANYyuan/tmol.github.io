<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>第一次来地球 · 时间记录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;      /* 纯黑背景 */
            font-family: "Segoe UI", "Microsoft YaHei", "PingFang SC", "Helvetica Neue", "黑体", "Hei", "Arial", sans-serif;
            font-weight: bold;              /* 全局粗体 */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        /* 主容器 – 简洁、呼吸感 */
        .container {
            max-width: 900px;
            width: 100%;
            background: #000000;
            border: 1px solid #222;
            border-radius: 48px;
            padding: 2rem 2rem 2.8rem;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }

        /* 主标题 */
        .title {
            font-size: 3rem;
            font-weight: 800;
            text-align: center;
            color: #ffffff;
            letter-spacing: 2px;
            margin-bottom: 0.75rem;
            word-break: keep-all;
        }
        .title span {
            display: inline-block;
            background: linear-gradient(135deg, #ffffff, #aaaaaa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* 副标题 / 描述 */
        .sub {
            text-align: center;
            color: #aaaaaa;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            border-bottom: 1px solid #222;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding-bottom: 0.5rem;
        }

        /* 主要计时卡片 */
        .timer-card {
            background: #0a0a0a;
            border-radius: 36px;
            padding: 2rem 1rem;
            margin: 1.8rem 0;
            text-align: center;
            border: 1px solid #1f1f1f;
        }

        /* 核心数字：年月日时分秒 */
        .main-time {
            font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 2px;
            word-break: break-word;
            line-height: 1.3;
        }

        /* 年份强调 */
        .years-badge {
            font-size: 1.5rem;
            color: #dddddd;
            margin-bottom: 1rem;
        }
        .years-number {
            font-size: 3rem;
            font-weight: 900;
            color: #ffffff;
            background: #111;
            padding: 0.2rem 1rem;
            border-radius: 60px;
            display: inline-block;
            margin: 0 0.25rem;
        }

        /* 四列统计数据 */
        .stats-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 1rem;
            margin: 2rem 0 1.5rem;
        }
        .stat-item {
            background: #0a0a0a;
            border-radius: 32px;
            padding: 1.2rem 0.5rem;
            flex: 1;
            text-align: center;
            border: 1px solid #1e1e1e;
            min-width: 100px;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #ffffff;
            font-family: monospace;
            letter-spacing: 1px;
        }
        .stat-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #888;
            margin-top: 0.5rem;
            text-transform: uppercase;
        }

        /* 出生标记 */
        .birth-info {
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: #5a5a5a;
            background: #050505;
            border-radius: 60px;
            padding: 0.5rem 1rem;
            width: fit-content;
            margin: 1rem auto 0;
            border: 1px solid #1c1c1c;
        }

        /* 刷新按钮 – 低调但精致 */
        .refresh-btn {
            background: transparent;
            border: 1px solid #2a2a2a;
            color: #cccccc;
            font-weight: bold;
            font-size: 0.85rem;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 1.5rem;
            font-family: inherit;
        }
        .refresh-btn:hover {
            background: #111;
            border-color: #555;
            color: white;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            font-weight: 500;
            color: #2c2c2c;
            margin-top: 2rem;
            letter-spacing: 0.5px;
        }

        /* 响应式 */
        @media (max-width: 650px) {
            .container {
                padding: 1.2rem;
            }
            .title {
                font-size: 2rem;
            }
            .main-time {
                font-size: 1.3rem;
            }
            .stat-number {
                font-size: 1.3rem;
            }
            .years-number {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="title">
        🌍 第一次来地球
    </div>
    <div style="text-align: center;">
        <div class="sub">✨ 实时地球居住证 ✨</div>
    </div>

    <!-- 主年份展示 -->
    <div class="years-badge" style="text-align: center;">
        <span>已经体验地球 · </span>
        <span class="years-number" id="yearsOnEarth">0</span>
        <span> 年</span>
    </div>

    <div class="timer-card">
        <div class="main-time" id="fullTimer">
            0年 0月 0天 00小时 00分钟 00秒
        </div>
    </div>

    <!-- 统计卡片 -->
    <div class="stats-grid">
        <div class="stat-item">
            <div class="stat-number" id="totalDays">0</div>
            <div class="stat-label">🌞 总天数</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="totalHours">0</div>
            <div class="stat-label">⏱️ 总小时</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="totalMinutes">0</div>
            <div class="stat-label">💫 总分钟</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="totalSeconds">0</div>
            <div class="stat-label">⚡ 总秒数</div>
        </div>
    </div>

    <div class="birth-info">
        🎂 首次登陆时间：1989年10月24日 23:30:00
    </div>

    <div style="display: flex; justify-content: center;">
        <button class="refresh-btn" id="refreshBtn">⟳ 刷新 / 同步心跳</button>
    </div>
    <footer>
        每秒都在长大 · 这一趟地球之旅值得记录
    </footer>
</div>

<script>
    // 出生时间：1989年10月24日 23:30:00 (注意月份从0开始，10月 => 9)
    const birthDate = new Date(1989, 9, 24, 23, 30, 0);

    function padZero(num) {
        return num < 10 ? '0' + num : '' + num;
    }

    // 精确计算 年/月/天/时/分/秒 (考虑借位)
    function getDetailedAge(now, birth) {
        let years = now.getFullYear() - birth.getFullYear();
        let months = now.getMonth() - birth.getMonth();
        let days = now.getDate() - birth.getDate();
        let hours = now.getHours() - birth.getHours();
        let minutes = now.getMinutes() - birth.getMinutes();
        let seconds = now.getSeconds() - birth.getSeconds();

        if (seconds < 0) {
            seconds += 60;
            minutes--;
        }
        if (minutes < 0) {
            minutes += 60;
            hours--;
        }
        if (hours < 0) {
            hours += 24;
            days--;
        }
        if (days < 0) {
            const prevMonthDate = new Date(now.getFullYear(), now.getMonth(), 0);
            const daysInPrevMonth = prevMonthDate.getDate();
            days += daysInPrevMonth;
            months--;
        }
        if (months < 0) {
            months += 12;
            years--;
        }
        return { years, months, days, hours, minutes, seconds };
    }

    // 总量统计
    function getTotalStats(now, birth) {
        const diffMs = now - birth;
        const totalSeconds = Math.floor(diffMs / 1000);
        const totalMinutes = Math.floor(totalSeconds / 60);
        const totalHours = Math.floor(totalMinutes / 60);
        const totalDays = Math.floor(totalHours / 24);
        return { totalDays, totalHours, totalMinutes, totalSeconds };
    }

    function updateTimer() {
        const now = new Date();
        const age = getDetailedAge(now, birthDate);
        const totals = getTotalStats(now, birthDate);

        // 更新年份
        document.getElementById('yearsOnEarth').innerText = age.years;

        // 完整时间字符串
        const timeStr = `${age.years}年 ${age.months}月 ${age.days}天 ${padZero(age.hours)}小时 ${padZero(age.minutes)}分钟 ${padZero(age.seconds)}秒`;
        document.getElementById('fullTimer').innerText = timeStr;

        // 更新统计数字
        document.getElementById('totalDays').innerText = totals.totalDays.toLocaleString();
        document.getElementById('totalHours').innerText = totals.totalHours.toLocaleString();
        document.getElementById('totalMinutes').innerText = totals.totalMinutes.toLocaleString();
        document.getElementById('totalSeconds').innerText = totals.totalSeconds.toLocaleString();
    }

    updateTimer();
    const interval = setInterval(updateTimer, 1000);

    const refreshBtn = document.getElementById('refreshBtn');
    refreshBtn.addEventListener('click', () => {
        updateTimer();
        refreshBtn.style.opacity = '0.7';
        setTimeout(() => { refreshBtn.style.opacity = '1'; }, 150);
    });

    window.addEventListener('beforeunload', () => clearInterval(interval));
</script>
</body>
</html>
