<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>第一次来地球 | 时间与宇宙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: black;
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', 'Arial Black', 'Impact', sans-serif;
            font-weight: 900;
            color: white;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        /* Canvas 底层：粒子系统 + 地球 + 旋转文字 */
        #universe-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 0;
        }

        /* 信息面板：悬浮在Canvas之上，半透明 */
        .info-panel {
            position: relative;
            z-index: 2;
            max-width: 500px;
            margin: 2rem auto;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 1.5rem 1.8rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            pointer-events: auto;
        }

        .title {
            font-size: 1.8rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff, #aaa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .years-badge {
            font-size: 1.2rem;
            color: #ffd966;
        }
        .years-number {
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
        }

        .full-timer {
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            background: #111;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            display: inline-block;
            margin: 0.6rem 0;
            letter-spacing: 1px;
            color: #ffaa66;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            gap: 0.8rem;
            margin: 1rem 0;
            flex-wrap: wrap;
        }
        .stat-card {
            background: rgba(20,20,20,0.8);
            border-radius: 24px;
            padding: 0.5rem;
            flex: 1;
            text-align: center;
            border: 1px solid #2a2a2a;
        }
        .stat-number {
            font-size: 1.2rem;
            font-weight: 900;
            color: #ffaa66;
        }
        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: #aaa;
        }

        .birth-info {
            font-size: 0.7rem;
            color: #ccc;
            margin-top: 0.5rem;
            border-top: 1px solid #333;
            padding-top: 0.8rem;
        }

        .refresh-btn {
            background: transparent;
            border: 1px solid #555;
            color: #fff;
            font-weight: bold;
            padding: 6px 20px;
            border-radius: 30px;
            margin-top: 1rem;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }
        .refresh-btn:hover {
            background: #1f1f1f;
            border-color: #ffaa66;
        }

        footer {
            font-size: 0.6rem;
            opacity: 0.4;
            margin-top: 1.2rem;
        }

        @media (max-width: 640px) {
            .info-panel { margin: 1rem; padding: 1rem; }
            .title { font-size: 1.2rem; }
            .years-number { font-size: 1.6rem; }
            .stat-number { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<canvas id="universe-canvas"></canvas>

<div class="info-panel">
    <div class="title">✨ 第一次来地球 ✨</div>
    <div class="years-badge">
        <span class="years-number" id="yearsCount">0</span> 年
    </div>
    <div class="full-timer" id="fullTimer">0年 0月 0天 00:00:00</div>

    <div class="stats-row">
        <div class="stat-card"><div class="stat-number" id="totalDays">0</div><div class="stat-label">天</div></div>
        <div class="stat-card"><div class="stat-number" id="totalHours">0</div><div class="stat-label">小时</div></div>
        <div class="stat-card"><div class="stat-number" id="totalMinutes">0</div><div class="stat-label">分钟</div></div>
        <div class="stat-card"><div class="stat-number" id="totalSeconds">0</div><div class="stat-label">秒</div></div>
    </div>

    <div class="birth-info">🎂 出厂配置：1989.10.24 23:30:00</div>
    <button class="refresh-btn" id="refreshBtn">⟳ 心跳同步</button>
    <footer>✨ 环绕的文字是宇宙的问候 ✨</footer>
</div>

<script>
    // ---------- 时间计算 ----------
    const birthDate = new Date(1989, 9, 24, 23, 30, 0);
    function pad(n) { return n < 10 ? '0' + n : n; }
    function getDetailedAge(now, birth) {
        let years = now.getFullYear() - birth.getFullYear();
        let months = now.getMonth() - birth.getMonth();
        let days = now.getDate() - birth.getDate();
        let hours = now.getHours() - birth.getHours();
        let minutes = now.getMinutes() - birth.getMinutes();
        let seconds = now.getSeconds() - birth.getSeconds();
        if (seconds < 0) { seconds += 60; minutes--; }
        if (minutes < 0) { minutes += 60; hours--; }
        if (hours < 0) { hours += 24; days--; }
        if (days < 0) { const pm = new Date(now.getFullYear(), now.getMonth(), 0); days += pm.getDate(); months--; }
        if (months < 0) { months += 12; years--; }
        return { years, months, days, hours, minutes, seconds };
    }
    function getTotals(now, birth) {
        const diffMs = now - birth;
        const sec = Math.floor(diffMs / 1000);
        const min = Math.floor(sec / 60);
        const hour = Math.floor(min / 60);
        const day = Math.floor(hour / 24);
        return { totalDays: day, totalHours: hour, totalMinutes: min, totalSeconds: sec };
    }
    function updateTimeDisplay() {
        const now = new Date();
        const age = getDetailedAge(now, birthDate);
        const totals = getTotals(now, birthDate);
        document.getElementById('yearsCount').innerText = age.years;
        document.getElementById('fullTimer').innerText = `${age.years}年 ${age.months}月 ${age.days}天 ${pad(age.hours)}:${pad(age.minutes)}:${pad(age.seconds)}`;
        document.getElementById('totalDays').innerText = totals.totalDays.toLocaleString();
        document.getElementById('totalHours').innerText = totals.totalHours.toLocaleString();
        document.getElementById('totalMinutes').innerText = totals.totalMinutes.toLocaleString();
        document.getElementById('totalSeconds').innerText = totals.totalSeconds.toLocaleString();
    }
    updateTimeDisplay();
    setInterval(updateTimeDisplay, 1000);
    document.getElementById('refreshBtn').addEventListener('click', () => updateTimeDisplay());

    // ---------- Canvas 宇宙：背景星星 + 粒子拖尾 + 地球 + 旋转文字 ----------
    const canvas = document.getElementById('universe-canvas');
    const ctx = canvas.getContext('2d');
    let width = window.innerWidth;
    let height = window.innerHeight;
    let particles = [];       // 鼠标拖尾粒子
    let stars = [];
    let mouseX = width/2, mouseY = height/2;

    function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // 静态背景星星 (漂浮)
    for (let i = 0; i < 200; i++) {
        stars.push({
            x: Math.random() * width,
            y: Math.random() * height,
            radius: Math.random() * 2 + 1,
            alpha: Math.random() * 0.6 + 0.2,
            vx: (Math.random() - 0.5) * 0.15,
            vy: (Math.random() - 0.5) * 0.1
        });
    }

    // 鼠标移动记录，拖尾粒子
    window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        for (let i = 0; i < 5; i++) {
            particles.push({
                x: mouseX + (Math.random() - 0.5) * 12,
                y: mouseY + (Math.random() - 0.5) * 12,
                radius: Math.random() * 5 + 2,
                alpha: 0.9,
                vx: (Math.random() - 0.5) * 2.8,
                vy: (Math.random() - 0.5) * 2.2 - 1,
                life: 1.0,
                color: `hsl(${Math.random() * 60 + 30}, 100%, 65%)`
            });
        }
    });

    function drawStars() {
        for (let s of stars) {
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 220, 150, ${s.alpha})`;
            ctx.fill();
            s.x += s.vx;
            s.y += s.vy;
            if (s.x < 0) s.x = width;
            if (s.x > width) s.x = 0;
            if (s.y < 0) s.y = height;
            if (s.y > height) s.y = 0;
        }
    }

    function updateParticles() {
        for (let i = 0; i < particles.length; i++) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.02;
            p.alpha = p.life * 0.8;
            if (p.life <= 0 || p.x < -100 || p.x > width+100 || p.y < -100 || p.y > height+100) {
                particles.splice(i,1);
                i--;
            }
        }
    }

    function drawParticles() {
        for (let p of particles) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI*2);
            ctx.fillStyle = p.color || `rgba(255, 200, 100, ${p.alpha})`;
            ctx.fill();
            ctx.shadowBlur = 6;
            ctx.shadowColor = '#ffaa66';
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    // ---------------- 绘制大地球 ----------------
    function drawEarth(centerX, centerY, radius) {
        // 地球的渐变模拟（海洋+陆地色块）
        const grad = ctx.createLinearGradient(centerX - radius*0.4, centerY - radius*0.4, centerX + radius*0.6, centerY + radius*0.6);
        grad.addColorStop(0, '#2a6f8f');
        grad.addColorStop(0.5, '#3c9ebf');
        grad.addColorStop(1, '#1c4e6b');
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        // 大陆块抽象斑点
        ctx.save();
        ctx.globalCompositeOperation = 'overlay';
        ctx.beginPath();
        ctx.arc(centerX - radius*0.2, centerY - radius*0.1, radius*0.3, 0, Math.PI*2);
        ctx.fillStyle = '#7cb342';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(centerX + radius*0.3, centerY + radius*0.2, radius*0.25, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(centerX - radius*0.4, centerY + radius*0.3, radius*0.2, radius*0.15, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
        
        // 大气层光晕
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#88ccff';
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius + 5, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(100, 180, 255, 0.15)';
        ctx.fill();
        ctx.shadowBlur = 0;
        // 高光
        ctx.beginPath();
        ctx.arc(centerX - radius*0.2, centerY - radius*0.2, radius*0.25, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,255,240,0.2)';
        ctx.fill();
    }

    // ---------------- 旋转文字 ----------------
    let angle = 0;
    const rotationSpeed = 0.008;
    // 想要围绕地球的文字数组（可以自定义）
    const orbitingWords = [
        "✨ TIME", "✨ JOURNEY", "✨ EARTH", "✨ LIFE",
        "✨ EXPLORE", "✨ DREAM", "✨ HAVE FUN TODAY"
    ];
    // 为了丰富，重复并加入更多趣味
    const fullOrbitList = [
        "✨ TIME", "✨ JOURNEY", "✨ EARTH", "✨ LIFE",
        "✨ EXPLORE", "✨ DREAM", "✨ HAVE FUN TODAY",
        "✨ 星尘", "✨ 呼吸", "✨ 此刻"
    ];
    
    function drawRotatingTexts(centerX, centerY, radius) {
        const textRadius = radius + 50;  // 文字环绕半径（比地球大一圈）
        const count = fullOrbitList.length;
        const step = (Math.PI * 2) / count;
        
        ctx.save();
        ctx.font = `bold ${Math.max(16, Math.min(28, radius * 0.12))}px 'PingFang SC', 'Microsoft YaHei', 'Arial Black'`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        
        for (let i = 0; i < count; i++) {
            const currentAngle = angle + i * step;
            const x = centerX + Math.cos(currentAngle) * textRadius;
            const y = centerY + Math.sin(currentAngle) * textRadius;
            // 文字颜色随角度变化
            const hue = (currentAngle * 180 / Math.PI + 180) % 360;
            ctx.fillStyle = `hsl(${hue}, 80%, 65%)`;
            ctx.shadowBlur = 6;
            ctx.shadowColor = '#ffaa77';
            ctx.fillText(fullOrbitList[i], x, y);
        }
        ctx.restore();
    }

    // 额外增加一个大的 "HAVE FUN TODAY" 漂浮装饰（不围绕，而是优雅地出现在地球附近或者飘动）
    let floatOffset = 0;
    function drawHaveFunToday(centerX, centerY, radius) {
        floatOffset += 0.01;
        const x = centerX + radius * 0.8 + Math.sin(floatOffset) * 15;
        const y = centerY - radius * 0.9 + Math.cos(floatOffset * 0.7) * 12;
        ctx.font = `italic 800 ${Math.max(18, radius * 0.12)}px 'PingFang SC', 'Arial Black'`;
        ctx.textAlign = "center";
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#ffcc88';
        ctx.fillStyle = "#FFE484";
        ctx.fillText("⭐ HAVE FUN TODAY ⭐", x, y);
        ctx.fillStyle = "#FFB347";
        ctx.fillText("⭐ HAVE FUN TODAY ⭐", x-2, y-2);
        ctx.fillStyle = "#FFF3B0";
        ctx.fillText("⭐ HAVE FUN TODAY ⭐", x+1, y+1);
        ctx.shadowBlur = 0;
    }

    // 主动画循环
    function animate() {
        if (!ctx) return;
        ctx.clearRect(0, 0, width, height);
        
        // 纯黑背景
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, width, height);
        
        // 星星
        drawStars();
        // 鼠标粒子拖尾
        updateParticles();
        drawParticles();
        
        // 地球位置：屏幕中央偏下一点，留出信息面板空间
        const earthX = width / 2;
        const earthY = height * 0.55;
        const earthRadius = Math.min(width, height) * 0.22; // 地球较大，占屏幕宽度约44%半径
        
        drawEarth(earthX, earthY, earthRadius);
        
        // 更新旋转角度
        angle += rotationSpeed;
        drawRotatingTexts(earthX, earthY, earthRadius);
        
        // 点缀：HAVE FUN TODAY 飘浮
        drawHaveFunToday(earthX, earthY, earthRadius);
        
        requestAnimationFrame(animate);
    }
    
    animate();

    // 窗口尺寸变化时重新计算星星位置（重新初始化避免错位）
    window.addEventListener('resize', () => {
        resizeCanvas();
        // 重置星星位置到新尺寸
        stars = [];
        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * width,
                y: Math.random() * height,
                radius: Math.random() * 2 + 1,
                alpha: Math.random() * 0.6 + 0.2,
                vx: (Math.random() - 0.5) * 0.15,
                vy: (Math.random() - 0.5) * 0.1
            });
        }
    });
</script>
</body>
</html>
