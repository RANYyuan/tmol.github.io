<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Make Animation · 导演界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            font-family: 'Inter', 'Helvetica Neue', 'SF Pro Text', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            font-weight: 500;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* 极简星辰背景（保留原有粒子，但更暗） */
        #stardust {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 2;
            max-width: 1000px;
            width: 90%;
            text-align: center;
            padding: 2rem;
        }

        /* 主标题 — 两行，黑体，红色为主 */
        .main-title {
            font-size: clamp(2.5rem, 10vw, 5.5rem);
            font-weight: 800;
            letter-spacing: 0.05em;
            line-height: 1.2;
            margin-bottom: 1rem;
        }
        .line1 {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255,255,255,0.3);
        }
        .line2 {
            color: #ff3333;
            text-shadow: 0 0 8px rgba(255,51,51,0.5);
            margin-top: -0.2rem;
        }

        /* 副标题 */
        .subtitle {
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            font-weight: 300;
            letter-spacing: 0.15em;
            color: #cccccc;
            margin: 1.5rem 0 2.5rem;
            border-top: 1px solid rgba(255,51,51,0.4);
            display: inline-block;
            padding-top: 1rem;
        }

        /* 按钮组 */
        .buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
            margin: 2rem 0;
        }
        .btn {
            background: transparent;
            border: 1.5px solid #ff3333;
            color: #ff3333;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.8rem 2rem;
            min-width: 140px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            backdrop-filter: blur(4px);
        }
        .btn:hover {
            background: #ff3333;
            color: #000000;
            box-shadow: 0 0 12px rgba(255,51,51,0.6);
            transform: scale(1.02);
        }

        /* 底部装饰线 */
        .footer-line {
            margin-top: 3rem;
            font-size: 0.65rem;
            color: #555;
            letter-spacing: 0.2em;
            border-top: 0.5px solid rgba(255,51,51,0.3);
            display: inline-block;
            padding-top: 1rem;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .btn { padding: 0.5rem 1rem; min-width: 110px; font-size: 0.8rem; }
            .subtitle { letter-spacing: 0.08em; }
        }
    </style>
</head>
<body>

<canvas id="stardust"></canvas>

<div class="container">
    <div class="main-title">
        <div class="line1">Make Animation</div>
        <div class="line2">Great Again</div>
    </div>
    <div class="subtitle">导演，我们是您的专业AI动画代理团队</div>
    <div class="buttons">
        <button class="btn" id="loginBtn">登录</button>
        <button class="btn" id="registerBtn">注册</button>
    </div>
    <div class="footer-line">© 2026 · 灵感驱动</div>
</div>

<script>
    // 按钮点击占位（可后续接入真实逻辑）
    document.getElementById('loginBtn').addEventListener('click', () => {
        alert('登录功能开发中，敬请期待');
    });
    document.getElementById('registerBtn').addEventListener('click', () => {
        alert('注册功能开发中，敬请期待');
    });

    // ---------- 保留极简星辰背景（与之前一致）----------
    const canvas = document.getElementById('stardust');
    const ctx = canvas.getContext('2d');
    let width = window.innerWidth;
    let height = window.innerHeight;
    let stars = [];

    function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        initStars();
    }

    function initStars() {
        stars = [];
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * width,
                y: Math.random() * height,
                radius: Math.random() * 1.5 + 0.5,
                alpha: Math.random() * 0.3 + 0.1,
                vx: (Math.random() - 0.5) * 0.03,
                vy: (Math.random() - 0.5) * 0.02
            });
        }
    }

    function drawStars() {
        for (let s of stars) {
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 220, 180, ${s.alpha})`;
            ctx.fill();
            s.x += s.vx;
            s.y += s.vy;
            if (s.x < 0) s.x = width;
            if (s.x > width) s.x = 0;
            if (s.y < 0) s.y = height;
            if (s.y > height) s.y = 0;
        }
    }

    function animateStars() {
        if (!ctx) return;
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, width, height);
        drawStars();
        requestAnimationFrame(animateStars);
    }

    window.addEventListener('resize', () => {
        resizeCanvas();
    });
    resizeCanvas();
    animateStars();
</script>
</body>
</html>
