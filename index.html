<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TRUE MEANING OF LIFE · 地球旅行日志</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: black;
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', 'Arial Black', 'Impact', sans-serif;
            font-weight: 900;
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* Canvas 星空背景 + 粒子效果 */
        #stars-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 0;
        }

        /* 主内容容器 — 位于星空之上 */
        .content {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            backdrop-filter: blur(0px);
            text-align: center;
        }

        /* 主标题 */
        .main-title {
            font-size: clamp(2.2rem, 10vw, 5rem);
            font-weight: 900;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #ffffff, #cccccc, #ffffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
            margin-bottom: 2rem;
            white-space: pre-wrap;
            word-break: keep-all;
        }

        /* 地球旅行年份 */
        .journey-years {
            font-size: clamp(1.2rem, 5vw, 2rem);
            font-weight: 800;
            color: #ffdfaa;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(8px);
            padding: 0.6rem 1.8rem;
            border-radius: 60px;
            display: inline-block;
            margin: 1rem 0 2rem;
            border: 1px solid rgba(255,215,150,0.3);
            letter-spacing: 2px;
        }
        .journey-years span {
            font-size: 2.2em;
            font-weight: 900;
            color: #ffc857;
            margin: 0 0.2rem;
        }

        /* 横排指标卡片 */
        .stats-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            margin: 1.5rem 0 2rem;
            max-width: 900px;
            width: 100%;
        }
        .stat-card {
            background: rgba(10,10,10,0.7);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 1rem 1.5rem;
            min-width: 110px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.15);
            transition: transform 0.2s, border-color 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #ffc857;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 900;
            font-family: 'Courier New', 'Fira Code', monospace;
            color: #ffdfaa;
            letter-spacing: 2px;
        }
        .stat-label {
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #bbbbbb;
            margin-top: 6px;
            letter-spacing: 1px;
        }

        /* 出生信息小字 */
        .birth-meta {
            font-size: 0.7rem;
            color: #888;
            margin-top: 2rem;
            border-top: 1px solid #222;
            padding-top: 1rem;
            display: inline-block;
        }

        /* 刷新按钮（低调） */
        .refresh-btn {
            background: transparent;
            border: 1px solid #444;
            color: #aaa;
            font-weight: bold;
            padding: 5px 20px;
            border-radius: 30px;
            margin-top: 1rem;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
            font-size: 0.7rem;
        }
        .refresh-btn:hover {
            border-color: #ffc857;
            color: #ffc857;
        }

        footer {
            font-size: 0.6rem;
            opacity: 0.4;
            margin-top: 2rem;
        }

        @media (max-width: 640px) {
            .stat-card { padding: 0.6rem 0.8rem; min-width: 70px; }
            .stat-number { font-size: 1.2rem; }
            .stat-label { font-size: 0.6rem; }
            .journey-years { font-size: 0.9rem; padding: 0.3rem 1rem; }
            .journey-years span { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<div class="content">
    <div class="main-title">TRUE MEANING OF LIFE</div>

    <div class="journey-years">
        🌍 地球旅行 · <span id="yearsCount">0</span> 年 🌍
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-number" id="totalDays">0</div>
            <div class="stat-label">天</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="totalHours">0</div>
            <div class="stat-label">小时</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="totalMinutes">0</div>
            <div class="stat-label">分钟</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="totalSeconds">0</div>
            <div class="stat-label">秒</div>
        </div>
    </div>

    <div class="birth-meta">
        🎂 初始坐标 · 1989年10月24日 23:30:00
    </div>

    <button class="refresh-btn" id="refreshBtn">⟳ 同步心跳</button>
    <footer>星辰之下 · 每秒皆为意义</footer>
</div>

<script>
    // ---------- 时间计算 ----------
    const birthDate = new Date(1989, 9, 24, 23, 30, 0);  // 月份 9 = 10月

    function getTotals(now, birth) {
        const diffMs = now - birth;
        const totalSeconds = Math.floor(diffMs / 1000);
        const totalMinutes = Math.floor(totalSeconds / 60);
        const totalHours = Math.floor(totalMinutes / 60);
        const totalDays = Math.floor(totalHours / 24);
        // 同时计算年份（用于展示）
        let years = now.getFullYear() - birth.getFullYear();
        let months = now.getMonth() - birth.getMonth();
        if (months < 0 || (months === 0 && now.getDate() < birth.getDate())) {
            years--;
        }
        return { totalDays, totalHours, totalMinutes, totalSeconds, years };
    }

    function updateDisplay() {
        const now = new Date();
        const stats = getTotals(now, birthDate);
        document.getElementById('yearsCount').innerText = stats.years;
        document.getElementById('totalDays').innerText = stats.totalDays.toLocaleString();
        document.getElementById('totalHours').innerText = stats.totalHours.toLocaleString();
        document.getElementById('totalMinutes').innerText = stats.totalMinutes.toLocaleString();
        document.getElementById('totalSeconds').innerText = stats.totalSeconds.toLocaleString();
    }

    updateDisplay();
    setInterval(updateDisplay, 1000);
    document.getElementById('refreshBtn').addEventListener('click', updateDisplay);

    // ---------- Canvas 星辰背景 + 鼠标星光粒子 ----------
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    let width = window.innerWidth;
    let height = window.innerHeight;
    let stars = [];
    let particles = [];
    let mouseX = width/2, mouseY = height/2;

    function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        initStars();   // 重置星星分布
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function initStars() {
        stars = [];
        for (let i = 0; i < 300; i++) {
            stars.push({
                x: Math.random() * width,
                y: Math.random() * height,
                radius: Math.random() * 2.5 + 1,
                alpha: Math.random() * 0.6 + 0.2,
                vx: (Math.random() - 0.5) * 0.12,
                vy: (Math.random() - 0.5) * 0.08
            });
        }
    }

    // 鼠标移动产生星光粒子
    window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        for (let i = 0; i < 4; i++) {
            particles.push({
                x: mouseX + (Math.random() - 0.5) * 12,
                y: mouseY + (Math.random() - 0.5) * 12,
                radius: Math.random() * 4 + 1.5,
                alpha: 0.9,
                vx: (Math.random() - 0.5) * 2.2,
                vy: (Math.random() - 0.5) * 1.8 - 0.8,
                life: 1.0,
                color: `hsl(${Math.random() * 60 + 40}, 100%, 65%)`
            });
        }
    });

    function drawStars() {
        for (let s of stars) {
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 235, 190, ${s.alpha})`;
            ctx.fill();
            // 缓慢漂浮
            s.x += s.vx;
            s.y += s.vy;
            if (s.x < 0) s.x = width;
            if (s.x > width) s.x = 0;
            if (s.y < 0) s.y = height;
            if (s.y > height) s.y = 0;
        }
    }

    function updateParticles() {
        for (let i = 0; i < particles.length; i++) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.02;
            p.alpha = p.life * 0.8;
            if (p.life <= 0 || p.x < -100 || p.x > width+100 || p.y < -100 || p.y > height+100) {
                particles.splice(i,1);
                i--;
            }
        }
    }

    function drawParticles() {
        for (let p of particles) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI*2);
            ctx.fillStyle = p.color || `rgba(255, 200, 100, ${p.alpha})`;
            ctx.fill();
            ctx.shadowBlur = 6;
            ctx.shadowColor = '#ffaa66';
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    function animateBackground() {
        if (!ctx) return;
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, width, height);
        drawStars();
        updateParticles();
        drawParticles();
        requestAnimationFrame(animateBackground);
    }
    animateBackground();
</script>
</body>
</html>
